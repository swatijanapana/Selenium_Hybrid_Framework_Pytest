


name: Python Test Automation CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test:
    runs-on: macos-latest


    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
            python -m pip install --upgrade pip
            pip install -r  requirements.txt

      - name: Run stable test suite
        run: pytest -m smoke -k "not firefox and not edge" -v --alluredir=Reports/allure-results

      - name: Install Allure
        run: brew install allure

      - name: Generate Allure report
        if: always()
        run: allure generate Reports/allure-results -o Reports/allure-report --clean


      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: Reports/allure-report

      - name: Deploy Allure report
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token:  ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  Reports/allure-report